<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Трекер калорий</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/i18n.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <div class="page">

    <!-- top bar: theme toggle + language -->
    <div class="topbar">
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">🌙</button>
      <div class="lang-wrapper">
        <img onclick="toggleDropdown()" id="current-lang-flag" class="current-flag" alt="flag">
        <div id="lang-dropdown" class="lang-dropdown"></div>
      </div>
    </div>

    <!-- hero card -->
    <div class="glass-card">
      <div class="hero-norm">
        <span id="dailyNorm" class="hero-norm-value">2000</span>
        <span data-i18n="unitKcal" class="hero-norm-unit"></span>
      </div>

      <div class="hero-stats">
        <div class="hero-stat">
          <div data-i18n="eaten" class="hero-stat-label"></div>
          <div id="totalToday" class="hero-stat-value">0</div>
        </div>
        <div class="hero-divider"></div>
        <div class="hero-stat">
          <div data-i18n="remaining" class="hero-stat-label"></div>
          <div id="remaining" class="hero-stat-value">2000</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </div>
    </div>

    <!-- tab bar -->
    <div class="tabs">
      <button data-tab="tab-today"   data-i18n="today"   class="tab-btn active"></button>
      <button data-tab="tab-foods"   data-i18n="myFoods" class="tab-btn"></button>
      <button data-tab="tab-history" data-i18n="history" class="tab-btn"></button>
      <button data-tab="tab-profile" data-i18n="profile" class="tab-btn"></button>
    </div>

    <!-- ── Today ── -->
    <div id="tab-today" class="tab-content">
      <div id="todayLogs"></div>
      <button onclick="openAddModal()" data-i18n="addMeal" class="gradient-btn lg"></button>
    </div>

    <!-- ── My Foods ── -->
    <div id="tab-foods" class="tab-content hidden">
      <h2 data-i18n="myFoods"></h2>
      <div id="foodsList"></div>

      <div class="card">
        <!-- type toggle -->
        <div class="seg-wrap form-group">
          <button id="food-type-fixed"   onclick="setFoodType('fixed')"   data-i18n="foodTypeFixed"   class="unit-btn active"></button>
          <button id="food-type-per100g" onclick="setFoodType('per100g')" data-i18n="foodTypePer100g" class="unit-btn"></button>
        </div>

        <div class="form-group">
          <input id="newFoodName" type="text" data-i18n-placeholder="foodNamePlaceholder">
        </div>

        <div class="form-group input-suffix-wrap">
          <input id="newFoodCalories" type="number" data-i18n-placeholder="caloriesPlaceholder">
          <span id="cal-unit-label" class="input-suffix" data-i18n="unitKcal"></span>
        </div>

        <button onclick="addNewFood()" data-i18n="addFoodToBase" class="gradient-btn"></button>
      </div>
    </div>

    <!-- ── History ── -->
    <div id="tab-history" class="tab-content hidden">
      <h2 data-i18n="history"></h2>

      <!-- calendar -->
      <div class="cal-card">
        <div class="cal-header">
          <button class="cal-nav" onclick="calShift(-1)">‹</button>
          <span id="calMonthLabel" class="cal-month-label"></span>
          <button class="cal-nav" onclick="calShift(1)">›</button>
        </div>
        <div class="cal-dow-row" id="calDowRow"></div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <!-- selected day detail -->
      <div id="dayDetail" class="day-detail hidden">
        <div class="day-detail-header">
          <span id="dayDetailDate" class="day-detail-date"></span>
          <span id="dayDetailTotal" class="day-detail-total"></span>
        </div>
        <div id="dayDetailLogs"></div>
      </div>
    </div>

    <!-- ── Profile ── -->
    <div id="tab-profile" class="tab-content hidden">
      <h2 data-i18n="profile"></h2>
      <div class="card">

        <div class="form-group">
          <select id="gender">
            <option value="male"   data-i18n="genderMale"></option>
            <option value="female" data-i18n="genderFemale"></option>
          </select>
        </div>

        <div class="form-group">
          <div data-i18n="ageLabel" class="field-label"></div>
          <input id="age" type="number" data-i18n-placeholder="agePlaceholder">
        </div>

        <div class="seg-wrap form-group">
          <button id="unit-metric"   data-i18n="unitsMetric"   onclick="setUnits('metric')"   class="unit-btn"></button>
          <button id="unit-imperial" data-i18n="unitsImperial" onclick="setUnits('imperial')" class="unit-btn"></button>
        </div>

        <div class="form-group">
          <div id="height-label" class="field-label"></div>
          <input id="height" type="number" data-i18n-placeholder="heightMetric">
        </div>

        <div class="form-group">
          <div id="weight-label" class="field-label"></div>
          <input id="weight" type="number" step="0.1" data-i18n-placeholder="weightMetric">
        </div>

        <div class="form-group">
          <div data-i18n="activityLabel" class="field-label"></div>
          <select id="activity">
            <option value="1.2"   data-i18n="activitySedentary"></option>
            <option value="1.375" data-i18n="activityLight"></option>
            <option value="1.55"  selected data-i18n="activityModerate"></option>
            <option value="1.725" data-i18n="activityHigh"></option>
            <option value="1.9"   data-i18n="activityVeryHigh"></option>
          </select>
        </div>

        <div class="form-group" style="display:flex; gap:0.75rem; align-items:flex-end;">
          <div style="flex:1">
            <div data-i18n="goalLabel" class="field-label"></div>
            <select id="goalType" onchange="toggleGoalPercent()">
              <option value="maintain" data-i18n="goalMaintain"></option>
              <option value="deficit"  data-i18n="goalDeficit"></option>
              <option value="surplus"  data-i18n="goalSurplus"></option>
            </select>
          </div>
          <div id="goal-percent-row" style="flex:1">
            <div data-i18n="goalPercentLabel" class="field-label"></div>
            <input id="goalPercent" type="number" step="0.1" value="10" data-i18n-placeholder="goalPercentPlaceholder">
          </div>
        </div>

        <button onclick="saveProfile()" data-i18n="saveProfile" class="gradient-btn" style="margin-top:0.5rem;font-size:1.1rem;"></button>
      </div>
    </div>

    <!-- ── Add meal modal ── -->
    <div id="addLogModal" class="modal-overlay" onclick="if(event.target===this)closeAddModal()">
      <div class="modal-sheet" onclick="event.stopPropagation()">

        <div class="modal-tabs">
          <button onclick="setModalTab('quick')"  id="mtab-quick"  data-i18n="addMealQuick"    class="modal-tab"></button>
          <button onclick="setModalTab('fixed')"  id="mtab-fixed"  data-i18n="addMealFromDish" class="modal-tab"></button>
          <button onclick="setModalTab('per100g')" id="mtab-per100g" data-i18n="addMealPer100g" class="modal-tab"></button>
        </div>

        <div class="modal-body">
          <!-- quick -->
          <div id="modal-quick">
            <div class="form-group">
              <input id="quickFoodName" type="text" data-i18n-placeholder="whatDidYouEat">
            </div>
            <div class="form-group">
              <input id="quickCalories" type="number" data-i18n-placeholder="calories">
            </div>
          </div>

          <!-- fixed dishes -->
          <div id="modal-fixed" class="hidden">
            <div id="fixedDishesList"></div>
          </div>

          <!-- per-100g dishes -->
          <div id="modal-per100g" class="hidden">
            <div id="per100gDishesList"></div>
          </div>
        </div>

        <!-- add button: shown for quick and per100g tabs, hidden for fixed -->
        <div id="modal-add-btn-wrap">
          <button id="modal-add-btn" onclick="modalAddAction()" data-i18n="add" class="gradient-btn" style="font-size:1.1rem;"></button>
        </div>

      </div>
    </div>

  </div><!-- .page -->
</body>
</html>
