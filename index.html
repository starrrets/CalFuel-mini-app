<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Трекер калорий</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/i18n.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20 font-google-sans">
  <div class="max-w-xl mx-auto p-5">

    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <span class="text-5xl">🍊</span>
        <h1 id="title" data-i18n="title" class="text-4xl font-semibold"></h1>
      </div>

      <div class="relative">
        <img onclick="toggleDropdown()" id="current-lang-flag" class="current-flag cursor-pointer" alt="flag">
        <div id="lang-dropdown" class="hidden absolute right-0 top-full mt-2 w-56 bg-zinc-900 rounded-3xl shadow-2xl py-2 z-50 border border-zinc-700 overflow-hidden"></div>
      </div>
    </div>

    <div class="glass-card mb-8">
      <div class="text-center pt-6 pb-4">
        <div data-i18n="normToday" class="text-zinc-400 text-sm mb-1"></div>
        <div id="dailyNorm" class="text-6xl font-semibold text-orange-400">2000</div>
        <div data-i18n="unitKcal" class="text-orange-400 text-xl -mt-1"></div>
      </div>

      <div class="flex justify-between px-6 text-sm mb-3">
        <div>
          <div data-i18n="eaten" class="text-zinc-400"></div>
          <div id="totalToday" class="text-3xl font-medium">820</div>
        </div>
        <div class="text-right">
          <div data-i18n="remaining" class="text-zinc-400"></div>
          <div id="remaining" class="text-3xl font-medium text-orange-400">1180 <span data-i18n="unitKcal"></span></div>
        </div>
      </div>

      <div class="px-6 pb-6">
        <div class="h-3 bg-zinc-800 rounded-3xl overflow-hidden">
          <div id="progressBar" class="h-3 bg-gradient-to-r from-orange-400 to-amber-500 rounded-3xl transition-all w-0"></div>
        </div>
      </div>
    </div>

    <div class="flex gap-1 mb-8 bg-zinc-900 rounded-3xl p-1">
      <button data-tab="tab-today" data-i18n="today" class="tab-btn active flex-1 py-4 rounded-3xl font-medium"></button>
      <button data-tab="tab-foods" data-i18n="myFoods" class="tab-btn flex-1 py-4 rounded-3xl font-medium"></button>
      <button data-tab="tab-history" data-i18n="history" class="tab-btn flex-1 py-4 rounded-3xl font-medium"></button>
      <button data-tab="tab-profile" data-i18n="profile" class="tab-btn flex-1 py-4 rounded-3xl font-medium"></button>
    </div>

    <div id="tab-today" class="tab-content">
      <h2 data-i18n="today" class="text-xl mb-4 px-1"></h2>
      <div id="todayLogs" class="space-y-3"></div>
      <button onclick="document.getElementById('addLogModal').classList.remove('hidden')" data-i18n="addMeal" class="w-full py-5 mt-8 text-xl font-medium rounded-3xl bg-gradient-to-r from-orange-400 to-amber-500 text-white shadow-xl"></button>
    </div>

    <div id="tab-foods" class="tab-content hidden">
      <h2 data-i18n="myFoods" class="text-xl mb-4 px-1"></h2>
      <div id="foodsList" class="mb-6"></div>
      <div class="bg-zinc-900 p-6 rounded-3xl">
        <input id="newFoodName" type="text" data-i18n-placeholder="foodNamePlaceholder" class="w-full mb-3 bg-zinc-800 text-white p-4 rounded-3xl">
        <input id="newFoodCalories" type="number" data-i18n-placeholder="caloriesPlaceholder" class="w-full mb-3 bg-zinc-800 text-white p-4 rounded-3xl">
        <button onclick="addNewFood()" data-i18n="addFoodToBase" class="w-full py-4 bg-orange-400 rounded-3xl"></button>
      </div>
    </div>

    <div id="tab-history" class="tab-content hidden">
      <h2 data-i18n="history" class="text-xl mb-4 px-1"></h2>
      <div id="historyContainer" class="space-y-2"></div>
    </div>

    <div id="tab-profile" class="tab-content hidden">
      <h2 data-i18n="profile" class="text-xl mb-4 px-1"></h2>
      <div class="bg-zinc-900 p-6 rounded-3xl space-y-4">
        <select id="gender" class="w-full bg-zinc-800 p-4 rounded-3xl">
          <option value="male" data-i18n="genderMale"></option>
          <option value="female" data-i18n="genderFemale"></option>
        </select>

        <div class="flex bg-zinc-800 rounded-3xl p-1">
          <button id="unit-metric" data-i18n="unitsMetric" onclick="setUnits('metric')" class="unit-btn flex-1 py-4 rounded-3xl font-medium"></button>
          <button id="unit-imperial" data-i18n="unitsImperial" onclick="setUnits('imperial')" class="unit-btn flex-1 py-4 rounded-3xl font-medium"></button>
        </div>

        <div>
          <div id="height-label" class="text-zinc-400 text-sm mb-1"></div>
          <input id="height" type="number" data-i18n-placeholder="heightMetric" class="w-full bg-zinc-800 p-4 rounded-3xl">
        </div>
        <div>
          <div id="weight-label" class="text-zinc-400 text-sm mb-1"></div>
          <input id="weight" type="number" step="0.1" data-i18n-placeholder="weightMetric" class="w-full bg-zinc-800 p-4 rounded-3xl">
        </div>

        <div>
          <div data-i18n="activityLabel" class="text-zinc-400 text-sm mb-1"></div>
          <select id="activity" class="w-full bg-zinc-800 p-4 rounded-3xl">
            <option value="1.2" data-i18n="activitySedentary"></option>
            <option value="1.375" data-i18n="activityLight"></option>
            <option value="1.55" selected data-i18n="activityModerate"></option>
            <option value="1.725" data-i18n="activityHigh"></option>
            <option value="1.9" data-i18n="activityVeryHigh"></option>
          </select>
        </div>

        <!-- Goal в одной строке -->
        <div class="flex gap-3 items-end">
          <div class="flex-1">
            <div data-i18n="goalLabel" class="text-zinc-400 text-sm mb-1"></div>
            <select id="goalType" class="w-full bg-zinc-800 p-4 rounded-3xl" onchange="toggleGoalPercent()">
              <option value="maintain" data-i18n="goalMaintain"></option>
              <option value="deficit" data-i18n="goalDeficit"></option>
              <option value="surplus" data-i18n="goalSurplus"></option>
            </select>
          </div>
          <div id="goal-percent-row" class="flex-1">
            <div data-i18n="goalPercentLabel" class="text-zinc-400 text-sm mb-1"></div>
            <input id="goalPercent" type="number" step="0.1" value="10" data-i18n-placeholder="goalPercentPlaceholder" class="w-full bg-zinc-800 p-4 rounded-3xl">
          </div>
        </div>

        <button onclick="saveProfile()" data-i18n="saveProfile" class="w-full py-4 bg-orange-400 rounded-3xl text-xl"></button>
      </div>
    </div>

    <div id="addLogModal" onclick="if(event.target.id==='addLogModal')this.classList.add('hidden')" class="hidden fixed inset-0 bg-black/70 flex items-end z-50">
      <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full rounded-t-3xl p-6">
        <h3 data-i18n="quickAdd" class="text-2xl mb-4"></h3>
        <input id="quickFoodName" type="text" data-i18n-placeholder="whatDidYouEat" class="w-full mb-4 bg-zinc-800 p-4 rounded-3xl">
        <input id="quickCalories" type="number" data-i18n-placeholder="calories" class="w-full mb-6 bg-zinc-800 p-4 rounded-3xl">
        <button onclick="quickAddLog()" data-i18n="add" class="w-full py-5 bg-orange-400 text-xl rounded-3xl"></button>
      </div>
    </div>
  </div>
</body>
</html>
