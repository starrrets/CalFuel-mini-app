<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CalFuel</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/i18n.js" defer></script>
  <script src="js/ingredients.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <div
    id="app-busy-overlay"
    class="app-busy-overlay"
    role="status"
    aria-live="polite"
    aria-hidden="true"
  >
    <div class="app-busy-card">
      <div class="app-busy-spinner" aria-hidden="true"></div>
      <div class="app-busy-title">Loading…</div>
      <div class="app-busy-subtitle">Syncing your data</div>
    </div>
  </div>
  <div class="page">

    <!-- tab bar -->
    <div class="tabs">
      <button data-tab="tab-today" class="tab-btn active">
        <svg width="15" height="20" viewBox="0 0 15 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">

        </svg>

        <span data-i18n="today"></span>
      </button>
      <button data-tab="tab-foods" class="tab-btn">
        <svg width="16" height="21" viewBox="0 0 16 21" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M14.3262 19.5029C15.4248 18.9668 15.7148 18.4746 15.7148 17.3232V3.88477C15.7148 2.38184 15.0205 1.66992 13.5791 1.66992H12.7441V1.43262C12.7441 0.500977 12.2695 0 11.4258 0C11.1445 0 10.8105 0.0703125 10.4238 0.202148C7.76953 1.05469 5.34375 1.62598 2.25 1.62598H1.58203C0.571289 1.62598 0 2.20605 0 3.12891V18.2109C0 18.9492 0.175781 19.3975 0.861328 19.7314C2.37305 20.4082 4.62305 20.8389 6.96094 20.8477C9.50977 20.8389 12.3486 20.4521 14.3262 19.5029ZM1.65234 17.4199V3.63867C1.65234 3.40137 1.77539 3.26074 2.00391 3.26074H2.42578C5.39648 3.26074 8.22656 2.64551 10.6436 1.89844C10.9248 1.80176 11.1006 1.88086 11.1006 2.14453V15.082C11.1006 15.5127 11.0391 15.6973 10.626 15.9697C8.86816 17.2002 5.82715 17.9297 1.95996 17.7363C1.74023 17.7275 1.65234 17.6309 1.65234 17.4199ZM11.8916 17.0859C12.5596 16.5762 12.7441 16.207 12.7441 15.3896V3.32227H13.5352C13.8955 3.32227 14.0625 3.50684 14.0625 3.91113V17.1475C14.0625 17.666 13.9746 17.8857 13.4736 18.0967C11.7686 18.8438 9.25488 19.3184 6.96094 19.3271C6.09961 19.3271 5.26465 19.3008 4.4209 19.2217C7.53223 19.0547 10.4326 18.1846 11.8916 17.0859ZM3.34863 5.51953V8.41992C3.34863 8.55176 3.4541 8.62207 3.55957 8.62207C5.58984 8.62207 7.67285 8.26172 9.25488 7.62891C9.33398 7.59375 9.37793 7.51465 9.37793 7.43555V4.42969C9.37793 4.22754 9.19336 4.18359 9.09668 4.21875C7.27734 4.89551 5.51074 5.21191 3.55957 5.29102C3.43652 5.2998 3.34863 5.39648 3.34863 5.51953Z"/>
        </svg>
        <span data-i18n="myFoods"></span>
      </button>
      <button data-tab="tab-history" class="tab-btn">
        <svg width="18" height="17" viewBox="0 0 18 17" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.8916 16.4268H14.9941C16.9014 16.4268 17.8945 15.4424 17.8945 13.5615V2.86523C17.8945 0.984375 16.9014 0 14.9941 0H2.8916C0.993164 0 0 0.975586 0 2.86523V13.5615C0 15.4424 0.993164 16.4268 2.8916 16.4268ZM2.88281 14.6777C2.15332 14.6777 1.74902 14.2998 1.74902 13.5264V5.44043C1.74902 4.66699 2.15332 4.28906 2.88281 4.28906H15.0029C15.7324 4.28906 16.1367 4.66699 16.1367 5.44043V13.5264C16.1367 14.2998 15.7324 14.6777 15.0029 14.6777H2.88281ZM7.25098 7.32129H7.76953C8.08594 7.32129 8.19141 7.22461 8.19141 6.91699V6.39844C8.19141 6.08203 8.08594 5.98535 7.76953 5.98535H7.25098C6.93457 5.98535 6.8291 6.08203 6.8291 6.39844V6.91699C6.8291 7.22461 6.93457 7.32129 7.25098 7.32129ZM10.125 7.32129H10.6436C10.9512 7.32129 11.0566 7.22461 11.0566 6.91699V6.39844C11.0566 6.08203 10.9512 5.98535 10.6436 5.98535H10.125C9.80859 5.98535 9.70312 6.08203 9.70312 6.39844V6.91699C9.70312 7.22461 9.80859 7.32129 10.125 7.32129ZM12.9902 7.32129H13.5088C13.8252 7.32129 13.9307 7.22461 13.9307 6.91699V6.39844C13.9307 6.08203 13.8252 5.98535 13.5088 5.98535H12.9902C12.6826 5.98535 12.5771 6.08203 12.5771 6.39844V6.91699C12.5771 7.22461 12.6826 7.32129 12.9902 7.32129ZM4.38574 10.1514H4.89551C5.21191 10.1514 5.31738 10.0547 5.31738 9.73828V9.21973C5.31738 8.91211 5.21191 8.81543 4.89551 8.81543H4.38574C4.06934 8.81543 3.96387 8.91211 3.96387 9.21973V9.73828C3.96387 10.0547 4.06934 10.1514 4.38574 10.1514ZM7.25098 10.1514H7.76953C8.08594 10.1514 8.19141 10.0547 8.19141 9.73828V9.21973C8.19141 8.91211 8.08594 8.81543 7.76953 8.81543H7.25098C6.93457 8.81543 6.8291 8.91211 6.8291 9.21973V9.73828C6.8291 10.0547 6.93457 10.1514 7.25098 10.1514ZM10.125 10.1514H10.6436C10.9512 10.1514 11.0566 10.0547 11.0566 9.73828V9.21973C11.0566 8.91211 10.9512 8.81543 10.6436 8.81543H10.125C9.80859 8.81543 9.70312 8.91211 9.70312 9.21973V9.73828C9.70312 10.0547 9.80859 10.1514 10.125 10.1514ZM12.9902 10.1514H13.5088C13.8252 10.1514 13.9307 10.0547 13.9307 9.73828V9.21973C13.9307 8.91211 13.8252 8.81543 13.5088 8.81543H12.9902C12.6826 8.81543 12.5771 8.91211 12.5771 9.21973V9.73828C12.5771 10.0547 12.6826 10.1514 12.9902 10.1514ZM4.38574 12.9727H4.89551C5.21191 12.9727 5.31738 12.876 5.31738 12.5684V12.0498C5.31738 11.7334 5.21191 11.6367 4.89551 11.6367H4.38574C4.06934 11.6367 3.96387 11.7334 3.96387 12.0498V12.5684C3.96387 12.876 4.06934 12.9727 4.38574 12.9727ZM7.25098 12.9727H7.76953C8.08594 12.9727 8.19141 12.876 8.19141 12.5684V12.0498C8.19141 11.7334 8.08594 11.6367 7.76953 11.6367H7.25098C6.93457 11.6367 6.8291 11.7334 6.8291 12.0498V12.5684C6.8291 12.876 6.93457 12.9727 7.25098 12.9727ZM10.125 12.9727H10.6436C10.9512 12.9727 11.0566 12.876 11.0566 12.5684V12.0498C11.0566 11.7334 10.9512 11.6367 10.6436 11.6367H10.125C9.80859 11.6367 9.70312 11.7334 9.70312 12.0498V12.5684C9.70312 12.876 9.80859 12.9727 10.125 12.9727Z"/>
        </svg>
        <span data-i18n="history"></span>
      </button>
      <button data-tab="tab-profile" class="tab-btn">
        <svg width="19" height="19" viewBox="0 0 19 19" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M9.08789 18.1758C14.0713 18.1758 18.1846 14.0625 18.1846 9.08789C18.1846 4.11328 14.0625 0 9.0791 0C4.10449 0 0 4.11328 0 9.08789C0 14.0625 4.11328 18.1758 9.08789 18.1758ZM9.08789 12.1289C6.60938 12.1289 4.68457 13.0166 3.75293 14.0361C2.55762 12.7441 1.82812 11.0039 1.82812 9.08789C1.82812 5.05371 5.05371 1.81934 9.0791 1.81934C13.1133 1.81934 16.3564 5.05371 16.3652 9.08789C16.3652 11.0039 15.6357 12.7441 14.4316 14.0449C13.5 13.0166 11.5752 12.1289 9.08789 12.1289ZM9.08789 10.6875C10.793 10.7051 12.1201 9.24609 12.1201 7.36523C12.1201 5.58984 10.7842 4.10449 9.08789 4.10449C7.40039 4.10449 6.05566 5.58984 6.06445 7.36523C6.07324 9.24609 7.3916 10.6787 9.08789 10.6875Z"/>
        </svg>
        <span data-i18n="profile"></span>
      </button>
    </div>

    <!-- ── Today ── -->
    <div id="tab-today" class="tab-content">
      <!-- header: greeting + date -->
      <div class="today-header">
        <span id="today-greeting" class="today-greeting"></span>
        <span id="today-date-label" class="today-date"></span>
      </div>

      <!-- gauge -->
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gaugeGradient" gradientUnits="userSpaceOnUse" x1="130" y1="22" x2="130" y2="238">
              <stop offset="0%"   stop-color="#ff7c3a"/>
              <stop offset="100%" stop-color="#d44000"/>
            </linearGradient>
          </defs>
          <circle id="gaugeTrack" class="gauge-track" cx="130" cy="130" r="108" fill="none" stroke-linecap="round"/>
          <circle id="gaugeFill"  class="gauge-fill"  cx="130" cy="130" r="108" fill="none" stroke="url(#gaugeGradient)" stroke-linecap="round"/>
          <text x="130" y="116" class="g-norm"  id="dailyNorm"  text-anchor="middle">—</text>
          <text x="130" y="135" class="g-unit"  data-i18n="unitKcal" text-anchor="middle"></text>
          <text x="88"   y="173" class="g-val"   id="totalToday" text-anchor="middle">—</text>
          <text x="88"   y="187" class="g-label" data-i18n="eaten" text-anchor="middle"></text>
          <line x1="130" y1="153" x2="130" y2="194" class="g-sep"/>
          <text x="172"  y="173" class="g-val"   id="remaining" text-anchor="middle">—</text>
          <text x="172"  y="187" class="g-label" data-i18n="remaining" text-anchor="middle"></text>
        </svg>
      </div>

      <!-- macro progress bars (shown only in macros mode) -->
      <div id="macroBarsToday" class="grouped-card hidden" style="margin-bottom:0.75rem">
        <div class="macro-bars">
          <div class="macro-bar-row">
            <span class="macro-bar-label protein" data-i18n="proteinsShort"></span>
            <div class="macro-bar-track protein-track"><div id="macroBarProtein" class="macro-bar-fill protein" style="width:0%"></div></div>
            <span id="macroValProtein" class="macro-bar-val protein">— г</span>
          </div>
          <div class="macro-bar-row">
            <span class="macro-bar-label fat" data-i18n="fatsShort"></span>
            <div class="macro-bar-track fat-track"><div id="macroBarFat" class="macro-bar-fill fat" style="width:0%"></div></div>
            <span id="macroValFat" class="macro-bar-val fat">— г</span>
          </div>
          <div class="macro-bar-row">
            <span class="macro-bar-label carbs" data-i18n="carbsShort"></span>
            <div class="macro-bar-track carbs-track"><div id="macroBarCarbs" class="macro-bar-fill carbs" style="width:0%"></div></div>
            <span id="macroValCarbs" class="macro-bar-val carbs">— г</span>
          </div>
        </div>
      </div>

      <div id="todayLogs"></div>
    </div>

    <!-- FAB: visible only on Today tab -->
    <button id="fab-add" onclick="openAddModal()" class="fab" aria-label="Add meal">
      <svg width="18" height="18" viewBox="0 0 15 15" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M1.00195 8.36719H6.36328V13.7285C6.36328 14.2734 6.81152 14.7305 7.36523 14.7305C7.91895 14.7305 8.36719 14.2734 8.36719 13.7285V8.36719H13.7285C14.2734 8.36719 14.7305 7.91895 14.7305 7.36523C14.7305 6.81152 14.2734 6.36328 13.7285 6.36328H8.36719V1.00195C8.36719 0.457031 7.91895 0 7.36523 0C6.81152 0 6.36328 0.457031 6.36328 1.00195V6.36328H1.00195C0.457031 6.36328 0 6.81152 0 7.36523C0 7.91895 0.457031 8.36719 1.00195 8.36719Z"/>
      </svg>
    </button>

    <!-- FAB: visible only on Foods tab -->
    <button id="fab-add-food" onclick="openAddFoodModal()" class="fab hidden" aria-label="Add dish">
      <svg width="18" height="18" viewBox="0 0 15 15" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M1.00195 8.36719H6.36328V13.7285C6.36328 14.2734 6.81152 14.7305 7.36523 14.7305C7.91895 14.7305 8.36719 14.2734 8.36719 13.7285V8.36719H13.7285C14.2734 8.36719 14.7305 7.91895 14.7305 7.36523C14.7305 6.81152 14.2734 6.36328 13.7285 6.36328H8.36719V1.00195C8.36719 0.457031 7.91895 0 7.36523 0C6.81152 0 6.36328 0.457031 6.36328 1.00195V6.36328H1.00195C0.457031 6.36328 0 6.81152 0 7.36523C0 7.91895 0.457031 8.36719 1.00195 8.36719Z"/>
      </svg>
    </button>

    <!-- ── My Foods ── -->
    <div id="tab-foods" class="tab-content hidden">
      <h2 data-i18n="myFoods"></h2>
      <div id="foodsList"></div>
    </div>

    <!-- ── History ── -->
    <div id="tab-history" class="tab-content hidden">
      <h2 data-i18n="history"></h2>
      <div class="grouped-card cal-card">
        <div class="cal-header">
          <button class="cal-nav" onclick="calShift(-1)">
            <svg width="17" height="17" viewBox="0 0 17 17" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.8916 16.4268H13.5352C15.4424 16.4268 16.4268 15.4424 16.4268 13.5615V2.86523C16.4268 0.984375 15.4424 0 13.5352 0H2.8916C0.993164 0 0 0.975586 0 2.86523V13.5615C0 15.4424 0.993164 16.4268 2.8916 16.4268ZM10.0195 12.5947C9.75586 12.8496 9.22852 12.832 8.94727 12.5684L5.32617 9.1582C4.78125 8.64844 4.78125 7.76953 5.32617 7.25977L8.94727 3.84961C9.25488 3.55957 9.7207 3.55957 10.0107 3.82324C10.3271 4.12207 10.3271 4.62305 10.0283 4.91309L6.5127 8.2002L10.0283 11.5049C10.3184 11.7949 10.3359 12.2783 10.0195 12.5947Z"/>
            </svg>
          </button>
          <span id="calMonthLabel" class="cal-month-label"></span>
          <button class="cal-nav" onclick="calShift(1)">
            <svg width="17" height="17" viewBox="0 0 17 17" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.8916 16.4268H13.5352C15.4424 16.4268 16.4268 15.4424 16.4268 13.5615V2.86523C16.4268 0.984375 15.4424 0 13.5352 0H2.8916C0.993164 0 0 0.975586 0 2.86523V13.5615C0 15.4424 0.993164 16.4268 2.8916 16.4268ZM6.16992 12.709C5.85352 12.3838 5.8623 11.8916 6.16992 11.5928L9.77344 8.20898L6.16992 4.8252C5.85352 4.53516 5.8623 4.02539 6.1875 3.71777C6.47754 3.43652 6.95215 3.4541 7.26855 3.74414L10.9863 7.2334C11.5488 7.76074 11.5488 8.6748 10.9863 9.19336L7.26855 12.6826C6.9873 12.9551 6.44238 12.9639 6.16992 12.709Z"/>
            </svg>
          </button>
        </div>
        <div class="cal-dow-row" id="calDowRow"></div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <div class="history-spacer"></div>
      <div id="dayDetail" class="day-detail hidden">
        <div class="day-detail-header">
          <span id="dayDetailDate" class="day-detail-date"></span>
          <div class="day-detail-stats">
            <span class="day-detail-stat eaten">
              <span class="day-detail-stat-label" data-i18n="eaten"></span>
              <span id="dayDetailEaten"></span>
            </span>
            <span class="day-detail-stat remaining">
              <span class="day-detail-stat-label" data-i18n="remaining"></span>
              <span id="dayDetailRemaining"></span>
            </span>
          </div>
        </div>
        <div id="dayDetailMacros" class="macro-bars hidden">
          <div class="macro-bar-row">
            <span class="macro-bar-label protein" data-i18n="proteinsShort"></span>
            <div class="macro-bar-track protein-track"><div id="histMacroBarProtein" class="macro-bar-fill protein" style="width:0%"></div></div>
            <span id="histMacroValProtein" class="macro-bar-val protein">— г</span>
          </div>
          <div class="macro-bar-row">
            <span class="macro-bar-label fat" data-i18n="fatsShort"></span>
            <div class="macro-bar-track fat-track"><div id="histMacroBarFat" class="macro-bar-fill fat" style="width:0%"></div></div>
            <span id="histMacroValFat" class="macro-bar-val fat">— г</span>
          </div>
          <div class="macro-bar-row">
            <span class="macro-bar-label carbs" data-i18n="carbsShort"></span>
            <div class="macro-bar-track carbs-track"><div id="histMacroBarCarbs" class="macro-bar-fill carbs" style="width:0%"></div></div>
            <span id="histMacroValCarbs" class="macro-bar-val carbs">— г</span>
          </div>
        </div>
        <div id="dayDetailLogs"></div>
      </div>
    </div>

    <!-- ── Profile ── -->
    <div id="tab-profile" class="tab-content hidden">
      <h2 data-i18n="profile"></h2>
      <div class="grouped-card">

        <div class="seg-wrap">
          <button id="gender-male"   onclick="setGender('male')"   data-i18n="genderMale"   class="seg-btn active"></button>
          <button id="gender-female" onclick="setGender('female')" data-i18n="genderFemale" class="seg-btn"></button>
        </div>

        <div class="form-row labeled">
          <span class="row-label" data-i18n="ageLabel"></span>
          <input id="age" type="number" data-i18n-placeholder="agePlaceholder">
        </div>

        <div class="seg-wrap">
          <button id="unit-metric"   data-i18n="unitsMetric"   onclick="setUnits('metric')"   class="seg-btn"></button>
          <button id="unit-imperial" data-i18n="unitsImperial" onclick="setUnits('imperial')" class="seg-btn"></button>
        </div>

        <div class="form-row labeled">
          <span id="height-label" class="row-label"></span>
          <input id="height" type="number" data-i18n-placeholder="heightMetric">
        </div>

        <div class="form-row labeled">
          <span id="weight-label" class="row-label"></span>
          <input id="weight" type="number" step="0.1" data-i18n-placeholder="weightMetric">
        </div>

        <div class="form-row labeled">
          <span class="row-label" data-i18n="activityLabel"></span>
          <select id="activity" class="select-right" style="text-align: right;">
            <option value="1.2"   data-i18n="activitySedentary"></option>
            <option value="1.375" data-i18n="activityLight"></option>
            <option value="1.55"  selected data-i18n="activityModerate"></option>
            <option value="1.725" data-i18n="activityHigh"></option>
            <option value="1.9"   data-i18n="activityVeryHigh"></option>
          </select>
        </div>

        <div id="goal-type-row" class="form-row labeled">
          <span class="row-label" data-i18n="goalLabel"></span>
          <select id="goalType" onchange="toggleGoalPercent()" class="select-right" style="text-align: right;">
            <option value="maintain" data-i18n="goalMaintain"></option>
            <option value="deficit"  data-i18n="goalDeficit"></option>
            <option value="surplus"  data-i18n="goalSurplus"></option>
          </select>
        </div>

        <div id="goal-percent-row" class="form-row labeled">
          <span class="row-label" data-i18n="goalPercentLabel"></span>
          <input id="goalPercent" type="number" step="0.1" value="10" data-i18n-placeholder="goalPercentPlaceholder">
        </div>

        <div id="tracking-mode-seg" class="seg-wrap">
          <button id="tracking-mode-simple" onclick="setTrackingMode('simple')" data-i18n="trackingModeSimple" class="seg-btn active"></button>
          <button id="tracking-mode-full"   onclick="setTrackingMode('full')"   data-i18n="trackingModeFull"   class="seg-btn"></button>
        </div>

      </div>
      <div class="profile-bottom">
        <button onclick="saveProfile()" data-i18n="saveProfile" class="btn-cta"></button>

        <!-- Language + Theme row -->
        <div class="profile-settings-row">
          <div class="lang-wrapper profile-lang-wrap">
            <button onclick="toggleDropdown()" id="current-lang-btn" class="profile-toggle-btn">
              <span class="profile-toggle-icon-wrap" id="lang-icon-wrap"></span>
              <span id="lang-toggle-label" class="profile-toggle-label"></span>
            </button>
            <div id="lang-dropdown" class="lang-dropdown"></div>
          </div>
          <button class="profile-toggle-btn" onclick="toggleTheme()" id="theme-btn">
            <span class="profile-toggle-icon-wrap" id="theme-icon-wrap"></span>
            <span id="theme-toggle-label" class="profile-toggle-label" data-i18n="themeLabel"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ── Add meal modal ── -->    <div id="addLogModal" class="modal-overlay" onclick="if(event.target===this)closeAddModal()">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>

        <div class="seg-wrap">
          <button onclick="setModalTab('quick')"   id="mtab-quick"   data-i18n="addMealQuick"    class="seg-btn active"></button>
          <button onclick="setModalTab('fixed')"   id="mtab-fixed"   data-i18n="addMealFromDish" class="seg-btn"></button>
          <button onclick="setModalTab('per100g')" id="mtab-per100g" data-i18n="addMealPer100g"  class="seg-btn"></button>
        </div>

        <div class="modal-body">
          <div id="modal-quick">
            <div class="grouped-card" style="margin-bottom:0">
              <div class="form-row"><input id="quickFoodName" type="text"   data-i18n-placeholder="whatDidYouEat"></div>
              <div class="form-row"><input id="quickCalories" type="number" data-i18n-placeholder="calories"></div>
              <div id="quickMacros" class="macro-inputs-group">
                <div class="form-row labeled">
                  <span class="row-label" data-i18n="proteins"></span>
                  <div class="input-suffix-wrap">
                    <input id="quickProtein" type="number" step="0.1">
                    <span class="input-suffix" data-i18n="unitGrams"></span>
                  </div>
                </div>
                <div class="form-row labeled">
                  <span class="row-label" data-i18n="fats"></span>
                  <div class="input-suffix-wrap">
                    <input id="quickFat" type="number" step="0.1">
                    <span class="input-suffix" data-i18n="unitGrams"></span>
                  </div>
                </div>
                <div class="form-row labeled">
                  <span class="row-label" data-i18n="carbs"></span>
                  <div class="input-suffix-wrap">
                    <input id="quickCarbs" type="number" step="0.1">
                    <span class="input-suffix" data-i18n="unitGrams"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div id="modal-fixed" class="hidden">
            <div class="modal-search-wrap">
              <div class="modal-search-inner">
                <span class="modal-search-icon">
                  <svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6.5 0a6.5 6.5 0 1 0 4.054 11.54l3.7 3.7a.75.75 0 0 0 1.06-1.06l-3.7-3.7A6.5 6.5 0 0 0 6.5 0Zm-5 6.5a5 5 0 1 1 10 0 5 5 0 0 1-10 0Z"/>
                  </svg>
                </span>
                <input id="fixedSearch" type="search" data-i18n-placeholder="search" oninput="filterFixedDishes(this.value)" autocomplete="off">
              </div>
            </div>
            <div id="fixedDishesList"></div>
          </div>
          <div id="modal-per100g" class="hidden"><div id="per100gDishesList"></div></div>
        </div>

        <div id="modal-add-btn-wrap" class="modal-add-wrap">
          <button id="modal-add-btn" onclick="modalAddAction()" data-i18n="add" class="btn-cta"></button>
        </div>
      </div>
    </div>

    <!-- ── Add dish modal ── -->
    <div id="addFoodModal" class="modal-overlay" onclick="if(event.target===this)closeAddFoodModal()">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>

        <div class="seg-wrap">
          <button onclick="setFoodType('fixed')"   id="food-type-fixed"   data-i18n="foodTypeFixed"   class="seg-btn active"></button>
          <button onclick="setFoodType('per100g')" id="food-type-per100g" data-i18n="foodTypePer100g" class="seg-btn"></button>
          <button onclick="setFoodType('builder')" id="food-type-builder" data-i18n="foodTypeBuilder" class="seg-btn"></button>
        </div>

        <div class="modal-body">
          <!-- fixed / per100g form -->
          <div id="food-form-rows">
            <div class="grouped-card" style="margin-bottom:0">
              <div class="form-row">
                <input id="newFoodName" type="text" data-i18n-placeholder="foodNamePlaceholder">
              </div>
              <div class="form-row input-suffix-wrap">
                <input id="newFoodCalories" type="number" data-i18n-placeholder="caloriesPlaceholder">
                <span id="cal-unit-label" class="input-suffix" data-i18n="unitKcal"></span>
              </div>
              <div id="newFoodMacros" class="macro-inputs-group">
                <div class="form-row labeled">
                  <span class="row-label" data-i18n="proteins"></span>
                  <div class="input-suffix-wrap">
                    <input id="newFoodProtein" type="number" step="0.1" data-i18n-placeholder="proteinsPlaceholder">
                    <span class="input-suffix" data-i18n="unitGrams"></span>
                  </div>
                </div>
                <div class="form-row labeled">
                  <span class="row-label" data-i18n="fats"></span>
                  <div class="input-suffix-wrap">
                    <input id="newFoodFat" type="number" step="0.1" data-i18n-placeholder="fatsPlaceholder">
                    <span class="input-suffix" data-i18n="unitGrams"></span>
                  </div>
                </div>
                <div class="form-row labeled">
                  <span class="row-label" data-i18n="carbs"></span>
                  <div class="input-suffix-wrap">
                    <input id="newFoodCarbs" type="number" step="0.1" data-i18n-placeholder="carbsPlaceholder">
                    <span class="input-suffix" data-i18n="unitGrams"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- builder panel -->
          <div id="builder-panel" class="hidden">
            <div class="grouped-card" style="margin-bottom:0.5rem">
              <div class="form-row">
                <input id="builderDishName" type="text" data-i18n-placeholder="foodNamePlaceholder">
              </div>
              <div class="form-row">
                <input id="builderSearch" type="text" data-i18n-placeholder="builderSearchPlaceholder" autocomplete="off" oninput="onBuilderSearch(this.value)">
              </div>
            </div>
            <div id="builderSuggestions"></div>
            <div id="builderIngredients"></div>
            <div class="grouped-card" id="builderWeightRow" style="display:none;margin-top:0.5rem">
              <div class="form-row labeled">
                <span class="row-label" data-i18n="builderDishWeight"></span>
                <div class="input-suffix-wrap">
                  <input id="builderDishWeight" type="number">
                  <span class="input-suffix" data-i18n="unitGrams"></span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="modal-add-wrap">
          <button id="foods-cta-btn" onclick="addFoodAction()" class="btn-cta btn-cta-icon">
            <span id="foods-cta-label" data-i18n="addFoodToBase"></span>
          </button>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
